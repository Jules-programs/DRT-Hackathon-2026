<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRT Bus Risk Demo</title>
  <style>
    :root {
      --bg-0: #f4efe6;
      --bg-1: #fff9f0;
      --ink-0: #172029;
      --ink-1: #3a4b57;
      --line: #d7ccba;
      --critical: #b42318;
      --warning: #b54708;
      --stable: #067647;
      --chip-bg: #fff4dd;
      --card: #fffdf7;
      --accent: #0f766e;
      --shadow: 0 14px 42px rgba(23, 32, 41, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink-0);
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 88% -4%, rgba(15, 118, 110, 0.25), transparent 25%),
        radial-gradient(circle at 7% 104%, rgba(180, 71, 8, 0.2), transparent 26%),
        linear-gradient(150deg, var(--bg-0), var(--bg-1));
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 1260px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94), rgba(255, 252, 244, 0.9));
      border: 1px solid rgba(214, 196, 168, 0.85);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .mast {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--line);
      background:
        repeating-linear-gradient(
          -45deg,
          rgba(255, 180, 73, 0.09),
          rgba(255, 180, 73, 0.09) 14px,
          rgba(255, 255, 255, 0.65) 14px,
          rgba(255, 255, 255, 0.65) 28px
        );
      animation: fadeIn 0.65s ease-out;
    }

    .title {
      margin: 0;
      letter-spacing: 0.02em;
      font-size: clamp(1.55rem, 2.6vw, 2.1rem);
    }

    .sub {
      margin: 6px 0 0;
      color: var(--ink-1);
      font-size: 0.96rem;
      max-width: 82ch;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.88);
      animation: riseIn 0.7s ease-out;
    }

    .field,
    .select {
      width: 100%;
      border: 1px solid #d4c8b6;
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink-0);
      background: #fff;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field:focus,
    .select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.18);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 10px;
      padding: 12px 24px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 247, 0.55);
      animation: riseIn 0.75s ease-out;
    }

    .card {
      border: 1px solid #dfd2bf;
      border-radius: 14px;
      background: var(--card);
      padding: 12px;
    }

    .card h3 {
      margin: 0;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-1);
    }

    .card .num {
      margin-top: 8px;
      font-size: clamp(1.2rem, 2.7vw, 1.8rem);
      font-weight: 700;
    }

    .critical-text {
      color: var(--critical);
    }

    .warning-text {
      color: var(--warning);
    }

    .stable-text {
      color: var(--stable);
    }

    .table-wrap {
      overflow-x: auto;
      padding: 0 8px 8px;
      animation: riseIn 0.85s ease-out;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 980px;
    }

    thead th {
      text-align: left;
      padding: 13px 14px;
      font-size: 0.81rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #2f3f4a;
      background: #f4e7d5;
      border-bottom: 1px solid #d8cab7;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid #ece3d5;
      vertical-align: top;
      font-size: 0.93rem;
      opacity: 0;
      transform: translateY(8px);
      animation: rowIn 0.35s ease forwards;
    }

    tbody tr:hover {
      background: #fff9ec;
    }

    .mono {
      font-family: "IBM Plex Mono", "Consolas", monospace;
      font-size: 0.88rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.03em;
      font-size: 0.75rem;
      padding: 5px 10px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge-critical {
      color: #fff;
      background: var(--critical);
      border-color: #9d1c12;
    }

    .badge-warning {
      color: #fff;
      background: var(--warning);
      border-color: #943b06;
    }

    .badge-stable {
      color: #fff;
      background: var(--stable);
      border-color: #05613b;
    }

    .chip {
      display: inline-flex;
      margin-top: 4px;
      margin-right: 6px;
      border: 1px solid #ebd8ba;
      background: var(--chip-bg);
      color: #6a4a2c;
      border-radius: 999px;
      font-size: 0.72rem;
      padding: 2px 8px;
    }

    .status {
      padding: 14px 24px 20px;
      color: var(--ink-1);
      font-size: 0.93rem;
    }

    .status strong {
      color: var(--ink-0);
    }

    .error {
      color: var(--critical);
      font-weight: 600;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes rowIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: repeat(2, minmax(120px, 1fr));
      }

      .status {
        padding-bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="mast">
      <h1 class="title">DRT Fleet Risk Table</h1>
      <p class="sub">
        Visual demo of maintenance risk from the two CSV snapshots. Sorted with highest risk first, including all assets and clear risk factors.
      </p>
    </header>

    <section class="controls">
      <input id="searchInput" class="field" type="search" placeholder="Search by bus number, model, garage, or risk factor" aria-label="Search assets">
      <select id="riskFilter" class="select" aria-label="Filter by risk level">
        <option value="ALL">All Risk Levels</option>
        <option value="CRITICAL">Critical</option>
        <option value="WARNING">Warning</option>
        <option value="STABLE">Stable</option>
      </select>
    </section>

    <section class="cards" id="summaryCards"></section>

    <section class="table-wrap">
      <table aria-label="Bus risk table">
        <thead>
          <tr>
            <th>Asset</th>
            <th>Risk</th>
            <th>Status</th>
            <th>Location</th>
            <th>Units Late</th>
            <th>Days Late</th>
            <th>Odometer / Next Trigger</th>
            <th>Tolerance</th>
            <th>Report Date</th>
            <th>Risk Factors</th>
          </tr>
        </thead>
        <tbody id="riskBody"></tbody>
      </table>
    </section>

    <footer class="status" id="statusText">Loading CSV data...</footer>
  </div>

  <script>
    const CSV_PATHS = {
      current: "../Full MAINTENANCE/Full MAINTENANCE/Preventative Maintenance Open Activities.csv",
      previous: "../Full MAINTENANCE/Full MAINTENANCE/20260212 Preventative Maintenance Open Activities.csv"
    };

    const AS_OF_DATE = new Date("2026-03-14T00:00:00");
    const riskBody = document.getElementById("riskBody");
    const statusText = document.getElementById("statusText");
    const summaryCards = document.getElementById("summaryCards");
    const searchInput = document.getElementById("searchInput");
    const riskFilter = document.getElementById("riskFilter");

    let allAssets = [];

    function parseCsvLine(line) {
      const values = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          current += '"';
          i += 1;
          continue;
        }

        if (char === '"') {
          inQuotes = !inQuotes;
          continue;
        }

        if (char === ',' && !inQuotes) {
          values.push(current.trim());
          current = "";
          continue;
        }

        current += char;
      }

      values.push(current.trim());
      return values;
    }

    function isTypeRow(row) {
      const known = new Set(["string", "float", "integer", "datetime"]);
      return row.length > 0 && row.every((cell) => known.has((cell || "").toLowerCase()));
    }

    function parseCsv(csvText) {
      const lines = csvText
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);

      if (lines.length === 0) {
        return [];
      }

      const headers = parseCsvLine(lines[0]).map((h) => h.toLowerCase());
      const dataStart = lines[1] && isTypeRow(parseCsvLine(lines[1])) ? 2 : 1;

      return lines.slice(dataStart).map((line) => {
        const values = parseCsvLine(line);
        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] || "";
        });
        return row;
      });
    }

    function toNum(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function parseDate(value) {
      if (!value) {
        return null;
      }
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function normalizeLocation(locDescription) {
      const text = (locDescription || "").toUpperCase();
      if (text.includes("RALEIGH")) return "Raleigh";
      if (text.includes("WESTNEY")) return "Westney";
      return "Unknown";
    }

    function normalizeStatus(status) {
      const text = (status || "").trim().toUpperCase();
      if (["DOWN", "OPERATING", "ACTIVE"].includes(text)) {
        return text;
      }
      return "UNKNOWN";
    }

    function isConventionalBus(assetDescription, meterName) {
      const desc = (assetDescription || "").toUpperCase();
      const meter = (meterName || "").toUpperCase();
      if (desc.includes("ADMIN") || desc.includes("UTV")) {
        return false;
      }
      return desc.includes("CONVENTIONAL") || meter === "ODOMETER";
    }

    function freshnessFromDate(reportDate) {
      if (!reportDate) {
        return "MISSING";
      }
      const dayMs = 24 * 60 * 60 * 1000;
      const age = (AS_OF_DATE.getTime() - reportDate.getTime()) / dayMs;
      return age <= 7 ? "CURRENT" : "STALE";
    }

    function calculateRisk(unitsLate, daysLate, tolerance, status) {
      if (status === "DOWN") {
        return { level: "CRITICAL", score: Math.max(unitsLate, tolerance), label: "Asset DOWN" };
      }
      if (unitsLate > tolerance || daysLate > 14) {
        return { level: "CRITICAL", score: Math.max(unitsLate, daysLate * 71), label: unitsLate + "km, " + daysLate + "d Overdue" };
      }
      if (unitsLate > (tolerance * 0.5) || daysLate > 7) {
        return { level: "WARNING", score: unitsLate, label: "Due Soon (" + daysLate + "d)" };
      }
      return { level: "STABLE", score: unitsLate, label: "Optimal" };
    }

    function latestByAlias(rows) {
      const byAlias = new Map();
      rows.forEach((row) => {
        const alias = row.alias || "";
        if (!alias) return;

        const existing = byAlias.get(alias);
        if (!existing) {
          byAlias.set(alias, row);
          return;
        }

        const existingDate = parseDate(existing.reportdate);
        const rowDate = parseDate(row.reportdate);
        if (!existingDate || (rowDate && rowDate > existingDate)) {
          byAlias.set(alias, row);
        }
      });
      return byAlias;
    }

    function rankRisk(level) {
      if (level === "CRITICAL") return 3;
      if (level === "WARNING") return 2;
      return 1;
    }

    function toAsset(currentRow, previousRow) {
      const unitsLate = toNum(currentRow.unitslate);
      const daysLate = toNum(currentRow.dayslate);
      const tolerance = toNum(currentRow.tolerance);
      const reportDate = parseDate(currentRow.reportdate);
      const status = normalizeStatus(currentRow.assetstatus || currentRow.pmstatus || "");
      const location = normalizeLocation(currentRow.locdescription || "");
      const conventional = isConventionalBus(currentRow.assetdescription, currentRow.metername);
      const risk = calculateRisk(unitsLate, daysLate, tolerance, status);
      const overToleranceByKm = Math.max(unitsLate - tolerance, 0);
      const riskRatio = tolerance > 0 ? unitsLate / tolerance : 0;
      const freshness = freshnessFromDate(reportDate);
      const prevUnitsLate = previousRow ? toNum(previousRow.unitslate) : null;
      const prevDaysLate = previousRow ? toNum(previousRow.dayslate) : null;

      const riskFactors = [];
      if (status === "DOWN") riskFactors.push("asset marked DOWN");
      if (unitsLate > tolerance) riskFactors.push("over tolerance by " + overToleranceByKm + "km");
      if (daysLate > 7) riskFactors.push(daysLate + " days overdue");
      if (freshness !== "CURRENT") riskFactors.push("data freshness " + freshness.toLowerCase());
      if (!conventional) riskFactors.push("non-conventional asset included");
      if (riskFactors.length === 0) riskFactors.push("no immediate red flags");

      return {
        busNumber: currentRow.alias || "",
        assetDescription: currentRow.assetdescription || "",
        assetType: conventional ? "CONVENTIONAL_BUS" : "NON_CONVENTIONAL_ASSET",
        isConventionalBus: conventional,
        location,
        assetStatus: status,
        reportDate,
        unitsLate,
        daysLate,
        tolerance,
        odometer: toNum(currentRow.lastreading),
        nextTrigger: toNum(currentRow.nexttrigger),
        riskLevel: risk.level,
        riskScore: risk.score,
        riskLabel: risk.label,
        riskRatio,
        overToleranceByKm,
        unitsLateDelta: prevUnitsLate === null ? null : unitsLate - prevUnitsLate,
        daysLateDelta: prevDaysLate === null ? null : daysLate - prevDaysLate,
        riskFactors
      };
    }

    function buildAssets(currentCsvText, previousCsvText) {
      const currentRows = parseCsv(currentCsvText);
      const previousRows = parseCsv(previousCsvText);
      const currentByAlias = latestByAlias(currentRows);
      const previousByAlias = latestByAlias(previousRows);

      return Array.from(currentByAlias.values())
        .map((row) => toAsset(row, previousByAlias.get(row.alias || "") || null))
        .sort((a, b) => {
          const riskDiff = rankRisk(b.riskLevel) - rankRisk(a.riskLevel);
          if (riskDiff !== 0) return riskDiff;
          if (b.unitsLate !== a.unitsLate) return b.unitsLate - a.unitsLate;
          return b.daysLate - a.daysLate;
        });
    }

    function badgeClass(level) {
      if (level === "CRITICAL") return "badge badge-critical";
      if (level === "WARNING") return "badge badge-warning";
      return "badge badge-stable";
    }

    function cardHtml(title, value, className) {
      return '<article class="card"><h3>' + title + '</h3><div class="num ' + className + '">' + value + '</div></article>';
    }

    function updateSummary(assets) {
      const critical = assets.filter((a) => a.riskLevel === "CRITICAL").length;
      const warning = assets.filter((a) => a.riskLevel === "WARNING").length;
      const stable = assets.filter((a) => a.riskLevel === "STABLE").length;
      const overduePct = assets.length ? ((assets.filter((a) => a.unitsLate > 0).length / assets.length) * 100).toFixed(1) + "%" : "0%";

      summaryCards.innerHTML = [
        cardHtml("Total Assets", String(assets.length), ""),
        cardHtml("Critical", String(critical), "critical-text"),
        cardHtml("Warning", String(warning), "warning-text"),
        cardHtml("Overdue %", overduePct, "stable-text")
      ].join("");
    }

    function formatDate(date) {
      if (!date) return "N/A";
      return date.toISOString().slice(0, 16).replace("T", " ");
    }

    function renderRows(assets) {
      riskBody.innerHTML = assets
        .map((asset, index) => {
          const factors = asset.riskFactors.map((factor) => '<span class="chip">' + factor + '</span>').join("");
          const deltaText = asset.unitsLateDelta === null
            ? "n/a"
            : (asset.unitsLateDelta >= 0 ? "+" : "") + asset.unitsLateDelta;

          return [
            '<tr style="animation-delay:' + (index * 0.01).toFixed(2) + 's">',
            '<td><strong class="mono">' + asset.busNumber + '</strong><br><span>' + asset.assetDescription + '</span><br><span class="chip">' + asset.assetType + '</span></td>',
            '<td><span class="' + badgeClass(asset.riskLevel) + '">' + asset.riskLevel + '</span><br><span>' + asset.riskLabel + '</span></td>',
            '<td>' + asset.assetStatus + '</td>',
            '<td>' + asset.location + '</td>',
            '<td class="mono">' + asset.unitsLate + ' km<br><span>delta: ' + deltaText + '</span></td>',
            '<td class="mono">' + asset.daysLate + '</td>',
            '<td class="mono">' + asset.odometer + ' / ' + asset.nextTrigger + '</td>',
            '<td class="mono">' + asset.tolerance + ' km<br><span>ratio: ' + asset.riskRatio.toFixed(2) + '</span></td>',
            '<td class="mono">' + formatDate(asset.reportDate) + '</td>',
            '<td>' + factors + '</td>',
            '</tr>'
          ].join("");
        })
        .join("");
    }

    function applyFilters() {
      const query = (searchInput.value || "").toLowerCase().trim();
      const risk = riskFilter.value;

      const filtered = allAssets.filter((asset) => {
        const matchesRisk = risk === "ALL" || asset.riskLevel === risk;
        if (!matchesRisk) return false;

        if (!query) return true;

        const haystack = [
          asset.busNumber,
          asset.assetDescription,
          asset.location,
          asset.assetStatus,
          asset.riskLevel,
          asset.riskFactors.join(" ")
        ].join(" ").toLowerCase();

        return haystack.includes(query);
      });

      renderRows(filtered);
      statusText.innerHTML = "<strong>Showing " + filtered.length + " of " + allAssets.length + " assets</strong> from both CSV snapshots.";
    }

    async function loadData() {
      try {
        const [currentRes, previousRes] = await Promise.all([
          fetch(CSV_PATHS.current, { cache: "no-store" }),
          fetch(CSV_PATHS.previous, { cache: "no-store" })
        ]);

        if (!currentRes.ok || !previousRes.ok) {
          throw new Error("Could not load one or both CSV files. Run from a local server and verify paths.");
        }

        const [currentCsvText, previousCsvText] = await Promise.all([
          currentRes.text(),
          previousRes.text()
        ]);

        allAssets = buildAssets(currentCsvText, previousCsvText);
        updateSummary(allAssets);
        applyFilters();
      } catch (error) {
        statusText.innerHTML = '<span class="error">' + error.message + '</span>';
      }
    }

    searchInput.addEventListener("input", applyFilters);
    riskFilter.addEventListener("change", applyFilters);

    loadData();
  </script>
</body>
</html>
