<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DRT Fleet Risk Tracker</title>
  <style>
    :root {
      --bg-0: #f4efe6;
      --bg-1: #fff9f0;
      --ink-0: #172029;
      --ink-1: #3a4b57;
      --line: #d7ccba;
      --critical: #b42318;
      --warning: #b54708;
      --stable: #067647;
      --chip-bg: #fff4dd;
      --card: #fffdf7;
      --accent: #0f766e;
      --shadow: 0 14px 42px rgba(23, 32, 41, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink-0);
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 88% -4%, rgba(15,118,110,.25), transparent 25%),
        radial-gradient(circle at 7% 104%, rgba(180,71,8,.2), transparent 26%),
        linear-gradient(150deg, var(--bg-0), var(--bg-1));
      min-height: 100vh;
      padding: 24px;
    }

    .shell {
      max-width: 1260px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,252,244,.9));
      border: 1px solid rgba(214,196,168,.85);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Masthead ── */
    .mast {
      padding: 24px 24px 16px;
      border-bottom: 1px solid var(--line);
      background: repeating-linear-gradient(
        -45deg,
        rgba(255,180,73,.09), rgba(255,180,73,.09) 14px,
        rgba(255,255,255,.65) 14px, rgba(255,255,255,.65) 28px
      );
      animation: fadeIn 0.65s ease-out;
    }
    .title {
      margin: 0;
      letter-spacing: .02em;
      font-size: clamp(1.55rem, 2.6vw, 2.1rem);
    }
    .sub {
      margin: 6px 0 0;
      color: var(--ink-1);
      font-size: .96rem;
      max-width: 82ch;
    }

    /* ── Controls ── */
    .controls {
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,253,247,.88);
      animation: riseIn 0.7s ease-out;
    }
    .field, .select {
      width: 100%;
      border: 1px solid #d4c8b6;
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      color: var(--ink-0);
      background: #fff;
      transition: border-color .2s, box-shadow .2s;
    }
    .field:focus, .select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15,118,110,.18);
    }

    /* ── Summary cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      padding: 12px 24px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,253,247,.55);
      animation: riseIn 0.75s ease-out;
    }
    .card {
      border: 1px solid #dfd2bf;
      border-radius: 14px;
      background: var(--card);
      padding: 12px;
    }
    .card h3 {
      margin: 0;
      font-size: .82rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--ink-1);
    }
    .card .num {
      margin-top: 8px;
      font-size: clamp(1.1rem, 2.3vw, 1.6rem);
      font-weight: 700;
    }
    .critical-text { color: var(--critical); }
    .warning-text  { color: var(--warning); }
    .stable-text   { color: var(--stable); }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      padding: 0 8px 8px;
      animation: riseIn 0.85s ease-out;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 980px;
    }
    thead th {
      text-align: left;
      padding: 13px 14px;
      font-size: .81rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: #2f3f4a;
      background: #f4e7d5;
      border-bottom: 1px solid #d8cab7;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid #ece3d5;
      vertical-align: top;
      font-size: .93rem;
      opacity: 0;
      transform: translateY(8px);
      animation: rowIn .35s ease forwards;
    }
    tbody tr:hover { background: #fff9ec; }

    .mono { font-family: "IBM Plex Mono", "Consolas", monospace; font-size: .88rem; }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: .03em;
      font-size: .75rem;
      padding: 5px 10px;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .badge-critical { color: #fff; background: var(--critical); border-color: #9d1c12; }
    .badge-warning  { color: #fff; background: var(--warning);  border-color: #943b06; }
    .badge-stable   { color: #fff; background: var(--stable);   border-color: #05613b; }

    /* ── Chips ── */
    .chip {
      display: inline-flex;
      margin-top: 4px;
      margin-right: 6px;
      border: 1px solid #ebd8ba;
      background: var(--chip-bg);
      color: #6a4a2c;
      border-radius: 999px;
      font-size: .72rem;
      padding: 2px 8px;
    }
    .chip-warn {
      border-color: #f5b46a;
      background: #fff0d6;
      color: #7a4300;
    }
    .chip-group { font-size: .82rem; color: var(--ink-1); margin-bottom: 4px; }
    .label-sub  { font-size: .82rem; color: var(--ink-1); }

    /* ── Footer ── */
    .status {
      padding: 14px 24px 20px;
      color: var(--ink-1);
      font-size: .93rem;
    }
    .status strong { color: var(--ink-0); }
    .error { color: var(--critical); font-weight: 600; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes riseIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes rowIn  { to   { opacity: 1; transform: translateY(0); } }

    @media (max-width: 900px) {
      body { padding: 12px; }
      .controls { grid-template-columns: 1fr; }
      .status { padding-bottom: 24px; }
    }
  </style>
</head>
<body>
  <div class="shell">

    <header class="mast">
      <h1 class="title">DRT Fleet Risk Tracker</h1>
      <p class="sub">
        Maintenance risk from current and previous PM CSV snapshots —
        sorted highest risk first, with delta tracking and data-quality flags.
      </p>
    </header>

    <section class="controls">
      <input
        id="searchInput"
        class="field"
        type="search"
        placeholder="Search by bus, model, garage, job plan, or risk factor"
        aria-label="Search assets"
      >
      <select id="riskFilter" class="select" aria-label="Filter by risk level">
        <option value="ALL">All Risk Levels</option>
        <option value="CRITICAL">Critical</option>
        <option value="WARNING">Warning</option>
        <option value="STABLE">Stable</option>
      </select>
    </section>

    <section class="cards" id="summaryCards" aria-label="Fleet summary"></section>

    <section class="table-wrap">
      <table aria-label="Bus risk table">
        <thead>
          <tr>
            <th>Asset</th>
            <th>Risk</th>
            <th>Status</th>
            <th>Location</th>
            <th>Units Late</th>
            <th>Days Late</th>
            <th>Odometer / Next Trigger</th>
            <th>Tolerance</th>
            <th>Report Date</th>
            <th>Job Plan / Risk Factors</th>
          </tr>
        </thead>
        <tbody id="riskBody"></tbody>
      </table>
    </section>

    <footer class="status" id="statusText" aria-live="polite">
      Loading CSV data…
    </footer>

  </div>

  <!--
    Compiled output from `tsc`.
    Run: npx tsc  (or your build tool of choice)
    The module type must match your tsconfig "module" setting.
  -->
  <script type="module" src="dist/main.js"></script>
</body>
</html>
